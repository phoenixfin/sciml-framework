name: docs

# Build the API reference from docstrings with pdoc and publish to GitHub Pages.
# One-time setup: repo Settings -> Pages -> Build and deployment -> Source =
# "GitHub Actions".
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (all extras + pdoc; TF needed so pdoc can import every module)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,docs]"
      - name: Build API docs
        run: pdoc sciml -o site --docformat numpy
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
