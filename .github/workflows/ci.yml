name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast, backend-free job: lint, docstring gates, compile, numpy tests.
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (dev extras, no deep-learning backend)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff (lint + import order)
        run: ruff check src experiments examples tests
      - name: pydoclint (docstring completeness)
        run: pydoclint src
      - name: interrogate (docstring coverage 100%)
        run: interrogate src
      - name: Byte-compile (syntax, incl. TF-only modules)
        run: python -m compileall -q src
      - name: pytest (numpy tests; TF tests skip)
        run: pytest -q

  # Full job WITH TensorFlow: the first time the TF engines actually run.
  tensorflow:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (all extras -- TensorFlow, SciPy, scikit-learn, pandas)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
      - name: pytest (TF-guarded tests now execute)
        run: pytest -q
      - name: Smoke-run a real FNO training (heat operator)
        run: python examples/05_heat_fno.py --n 40 --grid 32 --epochs 2
      - name: Smoke-run the SINDy pipeline (dengue)
        run: python -m sciml.cli dengue --quick
